<section class="servers">
  <app-dashboard />
  <h1>Servers</h1>

  <table mat-table [dataSource]="servers()" class="servers-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let server">{{ server.name }}</td>
    </ng-container>

    <ng-container matColumnDef="ipAddress">
      <th mat-header-cell *matHeaderCellDef>IP Address</th>
      <td mat-cell *matCellDef="let server">{{ server.ipAddress }}</td>
    </ng-container>

    <ng-container matColumnDef="ratio">
      <th mat-header-cell *matHeaderCellDef>Users</th>
      <td mat-cell *matCellDef="let server">{{ server.memberCount }}/{{ server.capacity }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let server">{{ server.active ? 'Active' : 'Inactive' }}</td>
    </ng-container>

    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let server">
        @if (canDelete(server)) {
          <button
            mat-icon-button
            color="warn"
            aria-label="Delete server"
            (click)="deleteServer(server.name)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</section>
