<section class="login">
  <h1>Login</h1>

  <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput name="username" [(ngModel)]="form.username" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input
        matInput
        type="password"
        name="password"
        [(ngModel)]="form.password"
        [matTooltip]="passwordTooltipMessage()"
        [matTooltipClass]="passwordTooltipClass()"
        matTooltipPosition="above"
        required
      />
      @if (loginError()) {
        <mat-error>{{ loginError() }}</mat-error>
      }
    </mat-form-field>

    <button mat-flat-button type="submit" [disabled]="loginForm.invalid || submitting()">
      Log In
    </button>
    <button mat-stroked-button type="button" routerLink="/register">
      Don't have an account? Register
    </button>
  </form>
</section>
