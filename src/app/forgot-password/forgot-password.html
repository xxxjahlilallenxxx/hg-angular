<section class="forgot-password">
  <mat-card class="forgot-password-card">
    <mat-card-header>
      <mat-card-title>Forgot Password</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form #forgotPasswordForm="ngForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput name="username" [(ngModel)]="username" required />
        </mat-form-field>

        <button mat-flat-button type="submit" [disabled]="forgotPasswordForm.invalid">
          Send Reset Link
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
