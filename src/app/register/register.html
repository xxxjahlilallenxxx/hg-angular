<section class="register">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Register</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form #registerForm="ngForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input
            matInput
            name="username"
            #usernameModel="ngModel"
            [(ngModel)]="form.username"
            (ngModelChange)="checkUsername()"
            [matTooltip]="usernameTooltipMessage()"
            [matTooltipClass]="usernameTooltipClass()"
            matTooltipPosition="above"
            required
          />
          @if (usernameError()) {
            <mat-error>{{ usernameError() }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="form.email" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="form.password" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirm Password</mat-label>
          <input
            matInput
            type="password"
            name="confirmPassword"
            [(ngModel)]="form.confirmPassword"
            required
          />
        </mat-form-field>

        <button mat-flat-button type="submit" [disabled]="registerForm.invalid || !!usernameError()">
          Register
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
